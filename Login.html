<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0" />
    <title>BiteBox</title>
    <!-- This is a Font Awesome link -->
    <script
      src="https://kit.fontawesome.com/a646d08f7d.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="image/favicon_io/favicon.ico" />
  </head>
  <body>
    <!-- This is a header Section -->
    <header>
      <nav>
        <img src="Image/Logo.png" alt="BiteBox Logo" width="70" height="70" />
        <ul>
          <li><a href="Home.html" class="active">Home</a></li>
          <li><a href="Menu.html">Menu</a></li>
          <li><a href="BitDeals.html">Bite Deals</a></li>
          <li>
            <a href="Cart.html"><i class="fa-solid fa-cart-plus"></i></a>
          </li>
          <li>
            <a href="Login.html"
              ><i class="fa-solid fa-arrow-right-to-bracket"></i> Login</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <section class="auth-container">
      <div class="authBox">
        <h2>Login To Bite<span class="box">Box</span></h2>
        <form action="">
          <input type="email" placeholder="Email" required />
          <div>
          <input type="password" placeholder="Password" required />
          <span onclick="togglePassword()"><i class="fa-solid fa-eye" id="togglePassword"></i></span>
          </div>
          <button type="submit" onclick="login()">Login</button>
        </form>
        <p>
          Forgot your password? <a href="ResetPassword.html">Reset Password</a>
        </p>
        <p>Don't have an account? <a href="Register.html">Register</a></p>
      </div>
    </section>
  </body>
</html>
